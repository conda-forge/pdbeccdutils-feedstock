{% set name = "pdbeccdutils" %}
{% set version = "1.0.3" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pdbeccdutils-{{ version }}.tar.gz
  sha256: a23167c7e0c05d48be91f2b44523ee80a66889360b5775053c298a5b65f2b3f8

build:
  entry_points:
    - process_components_cif = pdbeccdutils.scripts.process_components_cif_cli:main
    - setup_pubchem_library = pdbeccdutils.scripts.setup_pubchem_library_cli:main
    - read_boundmolecule = pdbeccdutils.scripts.boundmolecule_cli:run
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - python >={{ python_min }}
    - pillow >=10.4.0
    - scipy >=1.14.1
    - numpy >=1.26.4
    - requests >=2.32.3
    - gemmi >=0.6.6
    - networkx >=3.3.0
    - rdkit >=2023.9.6

test:
  imports:
    - pdbeccdutils
  commands:
    - pip check
    - process_components_cif --help
    - setup_pubchem_library --help
    - read_boundmolecule --help
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/PDBeurope/ccdutils
  summary: Toolkit to parse and process small molecules in wwPDB
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - roshkjr
    - dwhswenson
    - ethanholz
    - jnwei
